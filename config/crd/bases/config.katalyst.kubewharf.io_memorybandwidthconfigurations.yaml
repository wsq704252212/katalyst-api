---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
  name: memorybandwidthconfigurations.config.katalyst.kubewharf.io
spec:
  group: config.katalyst.kubewharf.io
  names:
    kind: MemoryBandwidthConfiguration
    listKind: MemoryBandwidthConfigurationList
    plural: memorybandwidthconfigurations
    shortNames:
    - mbc
    singular: memorybandwidthconfiguration
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    - jsonPath: .spec.paused
      name: PAUSED
      type: boolean
    - jsonPath: .spec.nodeLabelSelector
      name: SELECTOR
      type: string
    - jsonPath: .spec.priority
      name: PRIORITY
      type: string
    - jsonPath: .spec.ephemeralSelector.nodeNames
      name: NODES
      type: string
    - jsonPath: .spec.ephemeralSelector.lastDuration
      name: DURATION
      type: string
    - jsonPath: .status.targetNodes
      name: TARGET
      type: integer
    - jsonPath: .status.canaryNodes
      name: CANARY
      type: integer
    - jsonPath: .status.updatedTargetNodes
      name: UPDATED-TARGET
      type: integer
    - jsonPath: .status.currentHash
      name: HASH
      type: string
    - jsonPath: .status.conditions[?(@.type=="Valid")].status
      name: VALID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Valid")].reason
      name: REASON
      type: string
    - jsonPath: .status.conditions[?(@.type=="Valid")].message
      name: MESSAGE
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MemoryBandwidthConfiguration is the Schema for the configuration API used by the
          QRM memory bandwidth (MB) plugin. It exposes the per-node knobs that were
          previously only settable via katalyst-agent command line flags.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              config:
                description: Config is custom field for memory bandwidth configuration
                properties:
                  capLimitPercent:
                    description: |-
                      CapLimitPercent is the coefficient (percent) applied when translating a
                      desired outgoing target into the value written to the resctrl schemata,
                      since the set value tends to yield slightly more traffic than requested.
                      Maps to --mb-cap-limit-percent.
                    maximum: 100
                    minimum: 0
                    type: integer
                  ccdCapGroups:
                    additionalProperties:
                      type: integer
                    description: |-
                      CCDCapGroups sets, per control group, the target actual memory bandwidth
                      (in MB/s) per CCD that the P-Controller drives toward. Keyed by resctrl
                      group name (e.g. "dedicated=20000"). Requires CCDCapKp > 0 to take effect.
                      Maps to --mb-ccd-cap-groups.
                    type: object
                  ccdCapKp:
                    description: |-
                      CCDCapKp is the proportional gain of the P-Controller that governs the
                      per-CCD cap for CCDCapGroups. The P-Controller layer is only enabled when
                      this is greater than 0. Maps to --mb-ccd-cap-kp.
                    type: number
                  ccdMaxMB:
                    description: |-
                      CCDMaxMB is the maximum memory bandwidth (in MB/s) allowed per CCD; it is
                      the saturation point of bandwidth control and doubles as the "fully open"
                      value for no-throttle groups. Maps to --mb-ccd-max.
                    minimum: 0
                    type: integer
                  ccdMinMB:
                    description: |-
                      CCDMinMB is the minimum memory bandwidth (in MB/s) that any control group
                      is guaranteed per CCD; it is the throttling floor so a CCD is never
                      starved to a stall. Maps to --mb-ccd-min.
                    minimum: 0
                    type: integer
                  extraGroupPriorities:
                    additionalProperties:
                      type: integer
                    description: |-
                      ExtraGroupPriorities registers priority weights for resctrl control groups
                      beyond the built-in ones, controlling throttling order (higher weight is
                      protected longer). Keyed by group name. Maps to --mb-extra-group-priorities.
                    type: object
                  groupAwareCapacityPercentage:
                    additionalProperties:
                      type: integer
                    description: |-
                      GroupAwareCapacityPercentage customizes the effective domain capacity per
                      control group, expressed as a percentage of the measured domain capacity.
                      Only values in the open interval (0,100) take effect. Keyed by resctrl
                      group name (e.g. "share-50"). Maps to --mb-group-aware-capacity-percentage.
                    type: object
                  localIsVictim:
                    description: |-
                      LocalIsVictim selects the special AMD resctrl counter semantics where
                      mbm_total_bytes holds all reads and mbm_local_bytes holds victim writes,
                      so the reader reconstructs total bandwidth accordingly. Maps to
                      --mb-local-is-victim.
                    type: boolean
                  noThrottleGroups:
                    description: |-
                      NoThrottleGroups is the list of resctrl control groups that must never be
                      throttled regardless of pressure (the built-in root "/" is always exempt).
                      Maps to --mb-no-throttle-groups.
                    items:
                      type: string
                    type: array
                  resetResctrlOnly:
                    description: |-
                      ResetResctrlOnly, when true, makes the plugin only reset the resctrl
                      schemata files back to their default (unrestricted) state and then quit,
                      without actually managing bandwidth. Maps to --mb-reset-resctrl-only.
                    type: boolean
                type: object
              ephemeralSelector:
                description: EphemeralSelector is a selector for temporary use only
                properties:
                  lastDuration:
                    description: |-
                      define the duration this configuration will last from creationTimestamp.
                      must and only set when NodeNames already set
                    type: string
                  nodeNames:
                    description: Specific nodes' name the configurations will be effected.
                    items:
                      type: string
                    type: array
                type: object
              nodeLabelSelector:
                description: |-
                  NodeLabelSelector select nodes to apply these configurations,
                  the priority and node label selector must be matched according
                  to KatalystCustomConfig.spec.nodeLabelSelectorAllowedKeyList,
                  otherwise it will not be synced.
                type: string
              paused:
                description: Indicates that the config is paused.
                type: boolean
              priority:
                description: |-
                  Priority is used by one node matched by NodeLabelSelector of more
                  than one configuration, and the higher priority will be considered.
                  The priority only be supported when NodeLabelSelector set
                format: int32
                type: integer
              revisionHistoryLimit:
                default: 3
                description: |-
                  RevisionHistoryLimit is the maximum number of revisions that will
                  be maintained in the resource's revision history. The revision history
                  consists of all revisions not represented by a currently applied
                  Spec version. The default value is 3.
                format: int64
                type: integer
              updateStrategy:
                description: An update strategy to replace existing CustomNodeConfig
                  configurations with new ones.
                properties:
                  rollingUpdate:
                    description: |-
                      Rolling update config params. Present only if type = "RollingUpdate".
                      ---
                      TODO: Update this to follow our convention for oneOf, whatever we decide it
                      to be. Same as Deployment `strategy.rollingUpdate`.
                      See https://github.com/kubernetes/kubernetes/issues/35345
                    properties:
                      canary:
                        anyOf:
                        - type: integer
                        - type: string
                        description: |-
                          The number or percentage of target CustomNodeConfigs to update to the current configuration.
                          For example: `100`` and `20%` are valid values.
                        pattern: ^(100|[1-9][0-9]?|0)%$
                        x-kubernetes-int-or-string: true
                    type: object
                  type:
                    description: Type of config update. Only `RollingUpdate` is supported.
                    enum:
                    - RollingUpdate
                    type: string
                type: object
            required:
            - config
            type: object
          status:
            properties:
              canaryNodes:
                description: The number of nodes that this config is targeting and
                  should be updated given the current strategy.
                format: int32
                type: integer
              collisionCount:
                description: |-
                  Count of hash collisions for this cr. The kcc controller
                  uses this field as a collision avoidance mechanism when it needs to
                  create the name for the newest ControllerRevision.
                format: int32
                type: integer
              conditions:
                description: Represents the latest available observations of a config's
                  current state.
                items:
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transit from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: message is a human-readable explanation containing
                        details about the transition
                      type: string
                    reason:
                      description: reason is the reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type of config condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              currentHash:
                description: The hash of the current config observed by the kcc controller.
                type: string
              observedGeneration:
                description: The most recent generation observed by the kcc controller.
                format: int64
                type: integer
              targetNodes:
                description: The number of nodes that this config is targeting.
                format: int32
                type: integer
              updatedNodes:
                description: The number of nodes (including non-target nodes) that
                  have been updated by this config.
                format: int32
                type: integer
              updatedTargetNodes:
                description: The number of target nodes that have been updated by
                  this config.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
